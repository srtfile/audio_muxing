<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anime Stream Embed</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; padding: 20px; background: #0f0f0f; color: #e0e0e0; font-family: "Segoe UI", sans-serif; display: flex; flex-direction: column; align-items: center; }
    h1 { margin: 0 0 16px; font-size: 1.3rem; color: #c084fc; }
    .player-wrap, .controls, .status-bar { width: 100%; max-width: 960px; }
    .player-wrap { overflow: hidden; border-radius: 10px; background: #000; box-shadow: 0 0 40px rgba(192,132,252,.15); }
    #videoEmbed { display: block; width: 100%; aspect-ratio: 16 / 9; border: 0; background: #000; }
    /* The audio stream is also embedded in an iframe; it is hidden because it has no visual output. */
    #audioEmbed { position: absolute; width: 1px; height: 1px; border: 0; opacity: 0; pointer-events: none; }
    .controls { margin-top: 18px; display: flex; flex-wrap: wrap; gap: 14px; }
    .control-box { flex: 1; min-width: 200px; padding: 14px 18px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; }
    h3 { margin: 0 0 10px; font-size: .78rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
    button { padding: 7px 14px; color: #ccc; background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 6px; cursor: pointer; }
    button:hover { color: #fff; background: #3a3a3a; }
    button.active { color: #fff; background: #7c3aed; border-color: #c084fc; font-weight: 600; }
    .status-bar { margin-top: 12px; padding: 10px 16px; color: #888; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; font-size: .8rem; }
    .status-bar span { color: #c084fc; font-weight: 600; }
  </style>
</head>
<body>
  <h1>🎌 Anime Stream Embed</h1>
  <div class="player-wrap">
    <iframe id="videoEmbed" title="Video embed" allow="autoplay; fullscreen" loading="eager"></iframe>
  </div>
  <iframe id="audioEmbed" title="Audio embed" allow="autoplay" loading="eager"></iframe>

  <div class="controls">
    <div class="control-box"><h3>🎬 Video Quality</h3><div class="btn-group" id="qualityBtns"></div></div>
    <div class="control-box"><h3>🔊 Audio Language</h3><div class="btn-group" id="audioBtns"></div></div>
  </div>
  <div class="status-bar">Status: <span id="status">Loading direct video and audio embeds…</span></div>

  <script>
    const STREAMS = {
      videos: [
        { label: '480x360 / 946kbps', url: 'https://seiryuu.vid-cdn.xyz/8d3f2c88-e5a6-4806-8f89-14f8e09b5238/video/360/playlist.m3u8' },
        { label: '960x720 / 2376kbps', url: 'https://seiryuu.vid-cdn.xyz/8d3f2c88-e5a6-4806-8f89-14f8e09b5238/video/720/playlist.m3u8' },
        { label: '1440x1080 / 3476kbps', url: 'https://seiryuu.vid-cdn.xyz/8d3f2c88-e5a6-4806-8f89-14f8e09b5238/video/1080/playlist.m3u8' }
      ],
      audio: [
        { name: 'Japanese', lang: 'ja', url: 'https://seiryuu.vid-cdn.xyz/8d3f2c88-e5a6-4806-8f89-14f8e09b5238/audio/0_ja/playlist.m3u8' },
        { name: 'English', lang: 'en', url: 'https://seiryuu.vid-cdn.xyz/8d3f2c88-e5a6-4806-8f89-14f8e09b5238/audio/1_en/playlist.m3u8' }
      ]
    };

    const videoEmbed = document.getElementById('videoEmbed');
    const audioEmbed = document.getElementById('audioEmbed');
    const status = document.getElementById('status');
    let selectedVideo = STREAMS.videos.at(-1);
    let selectedAudio = STREAMS.audio.find(track => track.lang === 'en') || STREAMS.audio[0];

    function loadEmbeds() {
      videoEmbed.src = selectedVideo.url;
      audioEmbed.src = selectedAudio.url;
      status.textContent = `Embedded ${selectedVideo.label} video with ${selectedAudio.name} audio.`;
    }

    function makeButtons(items, containerId, selected, onSelect, label) {
      const container = document.getElementById(containerId);
      items.forEach(item => {
        const button = document.createElement('button');
        button.textContent = label(item);
        button.classList.toggle('active', item === selected);
        button.addEventListener('click', () => {
          container.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
          button.classList.add('active');
          onSelect(item);
        });
        container.appendChild(button);
      });
    }

    makeButtons(STREAMS.videos, 'qualityBtns', selectedVideo, video => { selectedVideo = video; loadEmbeds(); }, item => item.label);
    makeButtons(STREAMS.audio, 'audioBtns', selectedAudio, audio => { selectedAudio = audio; loadEmbeds(); }, item => (item.lang === 'en' ? '🇬🇧 ' : '🇯🇵 ') + item.name);
    loadEmbeds();
  </script>
</body>
</html>
